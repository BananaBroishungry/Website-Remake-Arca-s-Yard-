<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Welcome to Arca's Yard!</title>
</head>

<body>

    <header class="TopNav">

        <div class="Logo">
            <h2>Arca's Yard</h2>
        </div>

        <ul class="NavigationBtns">
            <li><a href="#home">Home</a></li>
            <li><a href="#menu">Menu</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </header>

    <section class="headline">
        <div class="headline-card">
            <img
                src="images/IMG_3184.jpg">

            <div class="overlay">
                <div class="headline-content">
                    <h1>Fresh Coffee, Quiet Nights.</h1>

                    <h3>Your daily escape at Arca's yard.</h3>

                    <div class="search-bar">
                        <input type="text" placeholder="Search our website...">
                    </div>
                </div>
            </div>
        </div>

    </section>

    <section class="info-grid">

    <div class="info-card">
        <img src="https://i.pinimg.com/originals/3a/98/46/3a98468e883db2a4f4970bc962a5e75d.gif" alt="coffee picnic">

        <div>
            <h2>Hours</h2>
            <p>Mon - Thurs: 9am - 7pm</p>
            <p>Fri - Sun: 9am - 9pm</p>
            <p>Wednesday: Closed</p>
        </div>
    </div>

    <div class="info-card">
        <img src="https://i.pinimg.com/736x/7e/2f/4b/7e2f4b508950a7b14d75969f17089c82.jpg" alt="coffee cafe">

        <div>
            <h2>Location</h2>
            <p>777 Tiptop, Ambuklao Road</p>
            <p>Baguio City, Philippines</p>
        </div>
    </div>

</section>
</body>

<script>
    let lastScrollY = window.scrollY;
    const nav = document.querySelector(".TopNav");

    window.addEventListener("scroll", () => {
        const currentScrollY = window.scrollY;

        if (currentScrollY > lastScrollY) {
            // If user scrolling down this hides the navbar :3
            nav.style.transform = "translateY(-100%)";
        } else {
            // Opposite here :3
            nav.style.transform = "translateY(0)";
        }

        lastScrollY = currentScrollY;
    });
</script>

</html>
