<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Welcome to Arca's Yard!</title>
</head>

<body>

    <header class="TopNav">

        <div class="Logo">
            <h2>Arca's Yard</h2>
        </div>

        <ul class="NavigationBtns">
            <li><a href="#home">Home</a></li>
            <li><a href="#menu">Menu</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </header>

    <section class="headline">
        <div class="headline-card">
            <img
                src="images/IMG_3184.jpg">

            <div class="overlay">
                <div class="headline-content">
                    <h1>Fresh Coffee, Quiet Nights.</h1>

                    <h3>Your daily escape at Arca's yard.</h3>

                    <div class="search-bar">
                        <input type="text" placeholder="Search our website...">
                    </div>
                </div>
            </div>
        </div>

    </section>
</body>

<script>
    let lastScrollY = window.scrollY;
    const nav = document.querySelector(".TopNav");

    window.addEventListener("scroll", () => {
        const currentScrollY = window.scrollY;

        if (currentScrollY > lastScrollY) {
            // If user scrolling down this hides the navbar :3
            nav.style.transform = "translateY(-100%)";
        } else {
            // Opposite here :3
            nav.style.transform = "translateY(0)";
        }

        lastScrollY = currentScrollY;
    });
</script>

</html>
